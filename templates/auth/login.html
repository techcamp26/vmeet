{% extends 'base.html' %}

{% block title %}Login - vZoom{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card glass">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-video"></i> vZoom
            </div>
            <div class="auth-subtitle">Secure, real-time video meetings</div>
        </div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="{% url 'forgot_password' %}" style="font-size: 12px; color: var(--accent-primary); text-decoration: none;">Forgot?</a>
                </div>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">Sign In</button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
