{% extends 'base.html' %}

{% block title %}Reset Password - vZoom{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card glass">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-key"></i> vZoom
            </div>
            <div class="auth-subtitle">Reset your account password (Local Mode)</div>
        </div>

        <form method="POST" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Enter registered email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" class="form-control" placeholder="Create new password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Verify new password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">Reset Password</button>
        </form>

        <div class="form-footer">
            Remembered it? <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
