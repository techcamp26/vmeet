{% extends 'base.html' %}

{% block title %}Password Required - vZoom{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card glass" style="text-align: center;">
        <div class="auth-header">
            <div class="auth-logo" style="color: var(--accent-warning);">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h3>Password Required</h3>
            <div class="auth-subtitle" style="margin-top: 10px;">
                Meeting: <strong>{{ meeting.title }}</strong><br>
                ID: <code>{{ meeting.meeting_id }}</code>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="meeting_password">Enter Meeting Password</label>
                <input type="password" name="meeting_password" id="meeting_password" class="form-control" placeholder="Passcode" required autofocus style="text-align: center;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">Verify & Join</button>
        </form>

        <div class="form-footer">
            <a href="{% url 'dashboard' %}">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
